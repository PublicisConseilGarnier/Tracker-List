# Render Blueprint — deploys the Garnier Campaign Tracker in one click.
# Docs: https://render.com/docs/blueprint-spec
#
# This provisions a Node web service. A Render Postgres is included but commented
# out because Render's FREE Postgres is hard-deleted after 30 days. For durable
# team data, prefer pointing DATABASE_URL at your existing Supabase (or Neon)
# Postgres — set it in the Render dashboard under Environment.

services:
  - type: web
    name: garnier-tracker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Shared write token — generated by Render. Put the SAME value in the
      # front-end (window.TRACKER_TOKEN) so the app can push.
      - key: SYNC_TOKEN
        generateValue: true
      # --- Option A (recommended): use your Supabase/Neon Postgres ---
      # Add DATABASE_URL manually in the dashboard (Environment tab).
      #
      # --- Option B: use a Render Postgres (expires after 30 days on free) ---
      # Uncomment the database block below AND this fromDatabase mapping:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: garnier-db
      #     property: connectionString

# databases:
#   - name: garnier-db
#     plan: free
#     databaseName: garnier
#     user: garnier
